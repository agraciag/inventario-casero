{% extends "base.html" %}

{% block title %}{% if box %}Editar Caja{% else %}Nueva Caja{% endif %}{% endblock %}

{% block content %}
<div class="p-4 max-w-lg mx-auto">
  <div class="flex items-center gap-3 mb-6">
    <a href="{% if box %}/boxes/{{ box.id }}{% else %}/{% endif %}" class="text-2xl">←</a>
    <h1 class="text-xl font-bold">{% if box %}Editar Caja {{ box.number }}{% else %}Nueva Caja{% endif %}</h1>
  </div>

  <form method="post" action="{% if box %}/boxes/{{ box.id }}/edit{% else %}/boxes/new{% endif %}" class="space-y-4">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Número</label>
      <input type="number" name="number" value="{{ box.number if box else next_number }}" required min="1"
             class="w-full p-3 border-2 border-gray-300 rounded-xl text-lg focus:border-blue-500 focus:outline-none">
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Etiqueta</label>
      <input type="text" name="label" value="{{ box.label if box else '' }}" required
             placeholder="Ej: Cocina - ollas"
             class="w-full p-3 border-2 border-gray-300 rounded-xl text-lg focus:border-blue-500 focus:outline-none">
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Ubicación</label>
      <input type="text" name="location" value="{{ box.location if box else '' }}"
             placeholder="Ej: Bodega, Sala, Recámara"
             class="w-full p-3 border-2 border-gray-300 rounded-xl text-lg focus:border-blue-500 focus:outline-none">
    </div>

    <button type="submit"
            class="w-full bg-blue-600 text-white py-3 rounded-xl text-lg font-semibold hover:bg-blue-700 active:bg-blue-800">
      {% if box %}Guardar{% else %}Crear Caja{% endif %}
    </button>
  </form>
</div>
{% endblock %}
