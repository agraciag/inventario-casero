<span id="{{ tags_id }}" class="inline-flex flex-wrap gap-1"{{ oob_attr }}>
  {% for key, label, color, count in summary %}
  {% set badge_colors = {
    'green': 'bg-green-100 text-green-800',
    'blue': 'bg-blue-100 text-blue-800',
    'yellow': 'bg-yellow-100 text-yellow-800',
    'orange': 'bg-orange-100 text-orange-800',
    'red': 'bg-red-100 text-red-800'
  } %}
  <span class="text-xs px-1.5 py-0.5 rounded-full {{ badge_colors.get(color, '') }}">{{ count }}</span>
  {% endfor %}
</span>
